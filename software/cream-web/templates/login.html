<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1E3A8A">
    <title>CREAM - Real Estate Management</title>
    <link rel="stylesheet" href="/static/css/cream.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-overlay">
        <div class="auth-container">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="logo-icon">🏠</div>
                <h1>CREAM</h1>
                <p>Capitalize Real Estate Asset Management</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="agent@realtor.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <a href="#" class="forgot-link" onclick="showForgot()">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-primary btn-large">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loading" style="display: none;">⏳</span>
                </button>
            </form>

            <!-- Register Toggle -->
            <div class="auth-toggle">
                <p>Don't have an account? <a href="#" onclick="showRegister()">Get started</a></p>
            </div>

            <!-- Demo Notice -->
            <div class="demo-notice">
                <p>👤 Demo: demo@cream.app / demo123</p>
            </div>
        </div>

        <!-- Background Pattern -->
        <div class="auth-bg">
            <div class="bg-pattern"></div>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Account</h2>
                <button class="close-btn" onclick="closeRegister()">×</button>
            </div>
            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="john@realtor.com" required>
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" name="company" placeholder="Keller Williams Realty">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Min 8 characters" required minlength="8">
                </div>
                <button type="submit" class="btn-primary btn-large">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
