worker_processes 1;
daemon off;

events {
    worker_connections 1024;
}

http {
    include /data/data/com.termux/files/usr/etc/nginx/mime.types;
    default_type application/octet-stream;
    
    server {
        listen 3333;
        server_name _;
        root /data/data/com.termux/files/home/mortimer/sales-command-v2;
        index index.html;
        
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
