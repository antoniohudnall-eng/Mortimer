<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortimer.cloud</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            color: #00d4ff;
            margin-bottom: 0.2em;
            text-shadow: 0 0 20px rgba(0,212,255,0.5);
        }
        .subtitle {
            font-size: 1.2em;
            color: #888;
            margin-bottom: 2em;
        }
        .status {
            background: rgba(0,212,255,0.1);
            border: 1px solid #00d4ff;
            border-radius: 10px;
            padding: 20px 40px;
            margin: 20px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            gap: 30px;
        }
        .dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #00ff88;
        }
        footer {
            margin-top: 3em;
            color: #555;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>Mortimer.cloud</h1>
    <p class="subtitle">SEED3 — General of the Forces</p>
    
    <div class="status">
        <div class="status-item">
            <span>Quantum Oracle</span>
            <span><span class="dot"></span> Online</span>
        </div>
        <div class="status-item">
            <span>Prime Helix</span>
            <span><span class="dot"></span> Online</span>
        </div>
        <div class="status-item">
            <span>Riemann Helix</span>
            <span><span class="dot"></span> Online</span>
        </div>
        <div class="status-item">
            <span>MNEMOSYNE</span>
            <span><span class="dot"></span> Online</span>
        </div>
    </div>
    
    <footer>
        C3 — Designation: SEED3<br>
        Built 2026-06-21
    </footer>
</body>
</html>
